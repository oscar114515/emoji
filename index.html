<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>emoji 字符畫 · 我的網站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding-top: 80px;
        }

        .navbar-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            transform: translateY(-100%);
            animation: slideDown 0.5s ease-out forwards;
            z-index: 4000;
        }

        @keyframes slideDown {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(0); }
        }

        .navbar {
            background-color: #f8f9fa;
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            width: 100%;
        }

        .logo a {
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 50px;
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #007bff;
            font-size: 1rem;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: #0056b3;
            text-decoration: underline;
        }

        .content-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            cursor: pointer;
        }

        .modal-box {
            background-color: white;
            padding: 30px 35px;
            border-radius: 16px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            cursor: default;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-box .title {
            font-size: 1.1rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 16px;
        }

        .modal-box .divider {
            height: 1px;
            background: #e8ecf0;
            margin: 14px 0;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .qq-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        .qq-number {
            font-size: 1.6rem;
            font-weight: bold;
            color: #333;
            letter-spacing: 2px;
        }

        .qq-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 4px;
        }

        .platform-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 6px;
        }

        .platform-btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            border: 1px solid #dce3ed;
            border-radius: 40px;
            background: #ffffff;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1a1a1a;
            cursor: pointer;
            text-align: center;
            transition: 0.15s;
            font-family: sans-serif;
        }

        .platform-btn:active {
            background: #f0f0f0;
            transform: scale(0.97);
        }

        .platform-btn.bili {
            color: #00a1d6;
        }
        .platform-btn.xhs {
            color: #ff2442;
        }
        .platform-btn.douyin {
            color: #000000;
        }
        .platform-btn.yt {
            color: #ff0000;
        }

        .char-player h1 {
            margin: 0 0 20px;
            font-weight: 400;
            font-size: 2.2rem;
            color: #1f3b5c;
            text-align: center;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(3px);
            border-radius: 48px;
            padding: 20px 10px;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .char-player button {
            border: 1px solid #cfddee;
            padding: 10px 24px;
            border-radius: 1024px;
            background: white;
            color: #1e2b3c;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .char-player button:hover {
            background: #e6f0ff;
            border-color: #90b8e0;
        }

        .slider-group {
            display: inline-flex;
            align-items: center;
            margin: 0 10px;
        }

        .char-player label {
            font-weight: 500;
            color: #1e3a5f;
            margin-right: 8px;
        }

        .char-player input[type=range] {
            width: 200px;
            height: 8px;
            background: #dbe4f0;
            border-radius: 10px;
            -webkit-appearance: none;
            appearance: none;
        }

        .char-player input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #0066cc;
            border-radius: 50%;
            cursor: pointer;
        }

        #video_wrapper,
        #img_wrapper {
            text-align: center;
            display: none;
            background: #ffffffd9;
            padding: 15px;
            border-radius: 32px;
            margin: 15px auto;
        }

        video,
        img {
            max-width: 100%;
            border-radius: 20px;
            max-height: 300px;
        }

        #ASCIIScreen {
            margin: 25px auto;
            line-height: 17px;
            font-size: 17px;
            background: white;
            color: #11181f;
            padding: 25px 20px;
            border-radius: 48px;
            box-shadow: 0 10px 30px -10px rgba(0, 30, 60, 0.2);
            border: 1px solid #eef3fc;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            width: fit-content;
            min-width: 300px;
        }

        #drag_overlay {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(4px);
            pointer-events: none;
            opacity: 0;
            z-index: 1;
        }

        .drag-overlay-content {
            position: absolute;
            left: 16px;
            top: 16px;
            width: calc(100% - 32px);
            height: calc(100% - 32px);
            display: grid;
            place-content: center;
            border: 3px dashed #2b4f7c;
            border-radius: 28px;
        }

        #canvas {
            display: none;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            border-top: 1px dashed #b3c9e0;
            padding-top: 20px;
        }

        .footer-text {
            color: #5a6e88;
        }

        .github-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #cfddee;
            padding: 10px 28px;
            border-radius: 1024px;
            background: white;
            color: #1e2b3c;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .github-btn:hover {
            background: #e6f0ff;
        }

        .github-icon {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 600px) {
            .modal-box {
                padding: 24px 20px;
                max-width: 300px;
            }
            .platform-grid {
                gap: 8px;
            }
            .platform-btn {
                padding: 10px 0;
                font-size: 0.85rem;
            }
            .qq-number {
                font-size: 1.3rem;
            }
            .qq-icon {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar-wrapper">
        <nav class="navbar">
            <div class="logo">
                <a href="/">
                    <img src="https://i.postimg.cc/HxVC7TcN/IMG-8863.png" alt="Logo">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="#" id="contactBtn">聯繫我們</a></li>
            </ul>
        </nav>
    </div>

    <div class="content-wrapper">
        <div class="card char-player">
            <h1>⚪ 字符画显示器 · 白光 ⚪</h1>
            <div class="control-panel">
                <div class="button-group">
                    <button onclick="selectVideo();">📁 选择视频</button>
                    <button onclick="selectImage();">🌅 选择图片</button>
                    <button onclick="useCamera();" id="btn_useCamera">📷 调用相机</button>
                    <button onclick="switchCamera();">🔄 切换相机</button>
                    <button onclick="copyScreen();">📋 复制字符画</button>
                    <button onclick="switchFullscreen();">⛶ 切换全屏</button>
                </div>
                <div style="text-align: center;">
                    <span class="slider-group">
                        <label>🔠 字体大小</label>
                        <input type="range" min="1" max="20" value="17" id="range_fontSize" oninput="adjustFontSize();">
                    </span>
                    <span class="slider-group">
                        <label>🗜️ 压缩程度</label>
                        <input type="range" min="4" max="100" value="16" id="range_compression" oninput="adjustCompression();">
                    </span>
                </div>
            </div>
            <div id="video_wrapper"><video id="video" controls></video></div>
            <div id="img_wrapper"><img id="img"></div>
            <canvas id="canvas"></canvas>
            <div id="ASCIIScreen"></div>
            <div class="footer-links">
                <span class="footer-text">Made by Burger Studio · 清爽浅色版</span>
                <a href="https://github.com/BGStudio2021/ASCII-Player/blob/main/recorder.html" target="_blank" class="github-btn">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg" alt="GitHub" class="github-icon">已开源
                </a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="contact-info">
                <img src="https://i.postimg.cc/Z520m4jx/e1fb8ec8ae1db1ac50505adac82398e4.jpg" class="qq-icon">
                <div class="qq-label">QQ</div>
                <span class="qq-number">1962487792</span>
            </div>
            <div class="divider"></div>
            <div class="title">📱 追蹤我</div>
            <div class="platform-grid">
                <button class="platform-btn bili" id="btn-bili">嗶哩嗶哩</button>
                <button class="platform-btn xhs" id="btn-xhs">小紅書</button>
                <button class="platform-btn douyin" id="btn-douyin">抖音</button>
                <button class="platform-btn yt" id="btn-yt">YouTube</button>
            </div>
        </div>
    </div>

    <div id="drag_overlay"><div class="drag-overlay-content">✨ 释放鼠标导入文件 ✨</div></div>

    <script>
        var video = document.getElementById("video");
        var img = document.getElementById("img");
        var canvas = document.getElementById("canvas");
        var ctx = canvas.getContext("2d");
        var ASCIIScreen = document.getElementById("ASCIIScreen");
        var compression = 16;
        var refColorList = [
            [232, 66, 86],
            [252, 134, 74],
            [239, 191, 76],
            [92, 222, 149],
            [72, 134, 214],
            [132, 102, 192],
            [136, 88, 86],
            [0, 0, 0],
            [255, 255, 255]
        ];
        var charList = ["🔴", "🟠", "🟡", "🟢", "🔵", "🟣", "🟤", "⚫", "⚪"];
        var imgMode = false;
        var cameraOn = false;
        var camera_facing = "environment";

        window.onload = function() {
            setInterval(() => {
                if (!imgMode && (video.paused || video.ended)) return;
                refreshScreen();
            }, 1000 / 30);
            adjustFontSize();
        };

        function refreshScreen() {
            if (imgMode) ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            else ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var data = imageData.data;
            var w = canvas.width,
                h = canvas.height;
            var result = '';

            for (var i = 0; i < h; i += compression) {
                for (var j = 0; j < w; j += compression) {
                    var r = data[(i * w + j) * 4];
                    var g = data[(i * w + j) * 4 + 1];
                    var b = data[(i * w + j) * 4 + 2];
                    var bestDiff = -1,
                        bestChar = '';
                    for (var k = 0; k < refColorList.length; k++) {
                        var diff = (r - refColorList[k][0]) ** 2 + (g - refColorList[k][1]) ** 2 + (b - refColorList[k][2]) **
                        2;
                        if (diff < bestDiff || bestDiff === -1) {
                            bestDiff = diff;
                            bestChar = charList[k];
                        }
                    }
                    result += bestChar;
                }
                result += '<br>';
            }
            ASCIIScreen.innerHTML = result;
        }

        function selectVideo() {
            if (cameraOn) stopCamera();
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = 'video/*';
            input.onchange = e => {
                video.src = URL.createObjectURL(e.target.files[0]);
            };
            input.click();
        }

        function selectImage() {
            if (cameraOn) stopCamera();
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                img.src = URL.createObjectURL(e.target.files[0]);
            };
            input.click();
        }

        function useCamera() {
            if (cameraOn) stopCamera();
            else {
                navigator.mediaDevices?.getUserMedia({ video: { facingMode: { exact: camera_facing } } })
                    .then(stream => {
                        video.srcObject = stream;
                        setImgMode(false);
                        video.play();
                        cameraOn = true;
                        document.getElementById('btn_useCamera').innerText = '📴 关闭相机';
                    })
                    .catch(() => alert('相机调用失败'));
            }
        }

        function stopCamera() {
            video.pause();
            video.srcObject?.getTracks()[0]?.stop();
            video.srcObject = null;
            cameraOn = false;
            document.getElementById('btn_useCamera').innerText = '📷 调用相机';
        }

        function switchCamera() {
            if (cameraOn) stopCamera();
            camera_facing = camera_facing === 'environment' ? 'user' : 'environment';
            useCamera();
        }

        video.onloadedmetadata = () => {
            setImgMode(false);
            video.play();
        };
        img.onload = () => setImgMode(true);

        function setImgMode(isImgMode) {
            imgMode = isImgMode;
            if (isImgMode) {
                document.getElementById('video_wrapper').style.display = 'none';
                document.getElementById('img_wrapper').style.display = 'block';
                canvas.width = img.width * 2;
                canvas.height = img.height * 2;
                document.getElementById('range_compression').min = 1;
                if (compression < 1) compression = 1;
            } else {
                document.getElementById('video_wrapper').style.display = 'block';
                document.getElementById('img_wrapper').style.display = 'none';
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                document.getElementById('range_compression').min = 4;
                if (compression < 4) compression = 4;
            }
        }

        function adjustFontSize() {
            var size = document.getElementById('range_fontSize').value;
            ASCIIScreen.style.fontSize = size + 'px';
            ASCIIScreen.style.lineHeight = size + 'px';
        }

        function adjustCompression() {
            compression = +document.getElementById('range_compression').value;
            refreshScreen();
        }

        function copyScreen() {
            var text = ASCIIScreen.innerHTML.replace(/<br>/g, '\n');
            navigator.clipboard?.writeText(text) || alert('复制失败');
            alert('字符画已复制');
        }

        function switchFullscreen() {
            if (document.fullscreenElement) document.exitFullscreen();
            else ASCIIScreen.requestFullscreen();
        }

        document.addEventListener('dragover', e => {
            e.preventDefault();
            document.getElementById('drag_overlay').style.opacity = 1;
        });
        document.addEventListener('dragleave', e => {
            e.preventDefault();
            document.getElementById('drag_overlay').style.opacity = 0;
        });
        document.addEventListener('drop', e => {
            e.preventDefault();
            document.getElementById('drag_overlay').style.opacity = 0;
            var file = e.dataTransfer.files[0];
            if (file) handleDragCopy(file);
        });
        document.addEventListener('paste', e => {
            var file = e.clipboardData.items[0]?.getAsFile();
            if (file) handleDragCopy(file);
        });

        function handleDragCopy(file) {
            if (cameraOn) stopCamera();
            var url = URL.createObjectURL(file);
            if (file.type.includes('video')) {
                video.src = url;
                setImgMode(false);
                video.play();
            } else if (file.type.includes('image')) {
                img.src = url;
                setImgMode(true);
            }
        }

        const contactBtn = document.getElementById('contactBtn');
        const modalOverlay = document.getElementById('modalOverlay');

        contactBtn.addEventListener('click', function(e) {
            e.preventDefault();
            modalOverlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });

        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) {
                modalOverlay.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modalOverlay.style.display === 'flex') {
                modalOverlay.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });

        document.getElementById('btn-bili').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://space.bilibili.com/3632309945239723', '_blank');
        });

        document.getElementById('btn-xhs').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://xhslink.com/m/5aECPzZiqGQ', '_blank');
        });

        document.getElementById('btn-douyin').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://v.douyin.com/HDdZvMmGXwU/', '_blank');
        });

        document.getElementById('btn-yt').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://www.youtube.com/@%E6%A2%81%E5%96%86%E5%90%8C%E5%AD%B8', '_blank');
        });
    </script>
</body>
</html>
